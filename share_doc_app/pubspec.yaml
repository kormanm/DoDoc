name: share_doc_app
description: ShareDocApp - Transform shared documents into actionable ToDo tasks via AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  receive_sharing_intent: ^1.8.0
  flutter_local_notifications: ^17.0.0
  android_alarm_manager_plus: ^4.0.1
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_appauth: 12.0.1
  flutter_secure_storage: ^9.0.0
  dio: ^5.4.0
  path: ^1.9.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  url_launcher: ^6.2.0
  open_filex: ^4.7.0
  app_links: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.15.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
